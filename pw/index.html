<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Data Processor</title>
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.css" rel="stylesheet">
    <!-- link href="style.css" rel="stylesheet" -->
    <style>
/* Additional custom styles */
.results-container {
    max-height: 500px;
    overflow-y: auto;
}

.results-container::-webkit-scrollbar {
    width: 8px;
}

.results-container::-webkit-scrollbar-track {
    background: var(--bs-body-bg);
}

.results-container::-webkit-scrollbar-thumb {
    background: var(--bs-secondary);
    border-radius: 4px;
}

/* Ensure consistent spacing */
.container {
    max-width: 1200px;
}

/* Style JSON output */
pre {
    background: var(--bs-body-bg);
    padding: 1rem;
    border-radius: 0.375rem;
    margin: 0;
    overflow-x: auto;
}

/* Loading spinner positioning */
#loadingSpinner {
    display: flex;
    justify-content: center;
    padding: 2rem 0;
}
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="loginSection" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">JSON Data Processor</h2>
                        <div id="loginError" class="alert alert-danger d-none"></div>
                        <form id="loginForm" onsubmit="return handleLogin(event)">
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Application Section (Initially Hidden) -->
    <div id="appSection" class="container py-4 d-none">
        <header class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
            <h1 class="display-5 fw-bold">JSON Data Processor</h1>
            <button onclick="logout()" class="btn btn-outline-danger">
                <i data-feather="log-out"></i> Logout
            </button>
        </header>

        <div class="row g-4">
            <!-- Input Section -->
            <div class="col-md-6">
                <div class="p-4 bg-body-tertiary rounded-3">
                    <h2 class="h4 mb-3">Input Parameters</h2>
                    <div class="mb-3">
                        <label for="searchKey" class="form-label">Search Key</label>
                        <input type="text" class="form-control" id="searchKey" 
                               placeholder="Enter key to filter">
                    </div>
                    <button class="btn btn-primary" onclick="fetchData()">
                        <i data-feather="search"></i> Process Data
                    </button>
                </div>
            </div>

            <!-- Output Section -->
            <div class="col-md-6">
                <div class="p-4 bg-body-tertiary rounded-3">
                    <h2 class="h4 mb-3">Results</h2>
                    <div id="loadingSpinner" class="d-none">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                    <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
                    <div id="results" class="results-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        // Configuration
const JSON_URL = eval(atob('YXRvYignYUhSMGNITTZMeTl5WVhjdVoybDBhSFZpZFhObGNtTnZiblJsYm5RdVkyOXRMMmhoWTJ0bGNuTXdNVEF3TDJGeVkyaHBkbVV2Y21WbWN5OW9aV0ZrY3k5dFlXbHVMM0IzTDJRdWFuTnZiZz09Jyk='));
const AUTHORIZED_PASSWORDS = [
    eval(atob('YXRvYignYVdSck1ERXdNQT09Jyk='))
];
const block = [];
// Authentication functions
function handleLogin(event) {
    event.preventDefault();
    const password = document.getElementById('password').value;
    const loginError = document.getElementById('loginError');

    if (AUTHORIZED_PASSWORDS.includes(password)) {
        document.getElementById('loginSection').classList.add('d-none');
        document.getElementById('appSection').classList.remove('d-none');
        loginError.classList.add('d-none');
        // Store login state
        sessionStorage.setItem('isLoggedIn', 'true');
    } else if (block.includes(password)) {loginError.textContent = 'YOU HAVE BEEN BLOCKED!';
                                         loginError.classList.remove('d-none');} else {
        loginError.textContent = 'Invalid password';
        loginError.classList.remove('d-none');
    }
    return false;
}

function logout() {
    document.getElementById('loginSection').classList.remove('d-none');
    document.getElementById('appSection').classList.add('d-none');
    document.getElementById('password').value = '';
    // Clear login state
    sessionStorage.removeItem('isLoggedIn');
}

// Check login state on page load
document.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('loginSection').classList.add('d-none');
        document.getElementById('appSection').classList.remove('d-none');
    }
});

// Helper function to show/hide loading spinner
function toggleLoading(show) {
    document.getElementById('loadingSpinner').classList.toggle('d-none', !show);
}

// Helper function to show/hide error message
function showError(message) {
    const errorElement = document.getElementById('errorMessage');
    if (message) {
        errorElement.textContent = message;
        errorElement.classList.remove('d-none');
    } else {
        errorElement.classList.add('d-none');
    }
}

// Helper function to display results
function displayResults(data) {
    const resultsContainer = document.getElementById('results');
    resultsContainer.innerHTML = '';

    if (Array.isArray(data)) {
        // Handle array of results
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card mb-3';
            div.innerHTML = `
                <div class="card-body">
                    <pre>${JSON.stringify(item, null, 2)}</pre>
                </div>
            `;
            resultsContainer.appendChild(div);
        });
    } else {
        // Handle single object
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div class="card-body">
                <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
        `;
        resultsContainer.appendChild(div);
    }
}

// Function to filter data based on search key
function filterData(data, searchKey) {
    if (!searchKey) return data;

    if (Array.isArray(data)) {
        return data.filter(item => {
            return Object.keys(item).some(key => 
                String(item[key]).toLowerCase().includes(searchKey.toLowerCase())
            );
        });
    } else if (typeof data === 'object') {
        const results = {};
        Object.keys(data).forEach(key => {
            if (String(data[key]).toLowerCase().includes(searchKey.toLowerCase())) {
                results[key] = data[key];
            }
        });
        return Object.keys(results).length ? results : null;
    }
    return null;
}

// Main function to fetch and process data
async function fetchData() {
    const searchKey = document.getElementById('searchKey').value;

    // Clear previous results and errors
    showError(null);
    document.getElementById('results').innerHTML = '';
    toggleLoading(true);

    try {
        const response = await fetch(JSON_URL);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        const filteredData = data[searchKey];//filterData(data, searchKey);

        if (!filteredData || (Array.isArray(filteredData) && !filteredData.length)) {
            showError('No results found for the given search key');
        } else {
            displayResults(filteredData);
        }
    } catch (error) {
        showError(`Failed to fetch data: ${error.message}`);
    } finally {
        toggleLoading(false);
    }
}

// Add event listener for Enter key on inputs
document.addEventListener('DOMContentLoaded', () => {
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (input.id === 'password') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                } else {
                    fetchData();
                }
            }
        });
    });
});
    </script>
    <script>
        // Initialize Feather icons
        feather.replace();
    </script>
</body>
</html>
